<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1200" role="img" aria-label="Место под реальное фото Ивана"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8ef"/><stop offset=".62" stop-color="#e6c29a"/><stop offset="1" stop-color="#6f4628"/></linearGradient><pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M0 26h80M0 54h80" stroke="#6f4628" stroke-opacity=".08" stroke-width="3"/><path d="M18 0c12 24 12 56 0 80M55 0c-12 22-12 58 0 80" stroke="#6f4628" stroke-opacity=".06" stroke-width="2" fill="none"/></pattern><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#3a2416" flood-opacity=".2"/></filter></defs><rect width="960" height="1200" rx="58" fill="url(#bg)"/><rect width="960" height="1200" rx="58" fill="url(#grain)"/><rect x="78" y="78" width="804" height="1044" rx="48" fill="#fff8ef" opacity=".92" filter="url(#s)"/><rect x="170" y="170" width="620" height="610" rx="40" fill="#fff" stroke="#d7b38d" stroke-width="6" stroke-dasharray="16 16"/><text x="480" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#6f4628">Место под</text><text x="480" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#6f4628">реальное фото</text><text x="480" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#3a2416">Иван на объекте</text><text x="480" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#3a2416">или рядом с инструментом</text><text x="120" y="880" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#24170f">Паркет36</text><text x="120" y="935" font-family="Arial, sans-serif" font-size="28" fill="#5d4638">Фото должно быть настоящим:</text><text x="120" y="980" font-family="Arial, sans-serif" font-size="28" fill="#5d4638">без стока, без генерации,</text><text x="120" y="1025" font-family="Arial, sans-s