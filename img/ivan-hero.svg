<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Паркет36 — место под реальные фотографии работ"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8ef"/><stop offset=".55" stop-color="#e8c8a4"/><stop offset="1" stop-color="#6f4628"/></linearGradient><pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse"><path d="M0 32h90M0 64h90" stroke="#6f4628" stroke-opacity=".08" stroke-width="3"/><path d="M15 0c18 26 18 58 0 90M58 0c-16 28-16 56 0 90" stroke="#6f4628" stroke-opacity=".07" stroke-width="2" fill="none"/></pattern><filter id="shadow"><feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#3a2416" flood-opacity=".2"/></filter></defs><rect width="1600" height="900" rx="58" fill="url(#bg)"/><rect width="1600" height="900" rx="58" fill="url(#grain)"/><rect x="86" y="86" width="1428" height="728" rx="48" fill="#fff8ef" opacity=".9" filter="url(#shadow)"/><text x="150" y="180" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#6f4628">ПАРКЕТ36</text><text x="150" y="255" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#24170f">Сюда нужны реальные фото</text><text x="150" y="325" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#24170f">Ивана и выполненных работ</text><text x="150" y="405" font-family="Arial, sans-serif" font-size="32" fill="#5d4638">Пока фото не готовы, лучше честный блок-заготовка,</text><text x="150" y="450" font-family="Arial, sans-serif" font-size="32" fill="#5d4638">чем искусственная картинка без доверия.</text><g transform="translate(150 525)"><rect width="390" height="165" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4" stroke-dasharray="12 12"/><text x="34" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#6f4628">Фото 1</text><text x="34" y="115" font-family="Arial, sans-serif" font-size="25" fill="#3a2416">Иван или процесс</text></g><g transform="translate(590 525)"><rect width="390" height="165" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4" stroke-dasharray="12 12"/><text x="34" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#6f4628">Фото 2</text><text x="34" y="115" font-family="Arial, sans-serif" font-size="25" fill="#3a2416">Пол до работ</text></g><g transform="translate(1030 525)"><rect width="390" height="165" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4" stroke-dasharray="12 12"/><text x="34" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#6f4628">Фото 3</text><text x="34" y="115" font-family="Arial, sans-serif" font-size="25" fill="#3a2416">Результат после</text></g></svg>