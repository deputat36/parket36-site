<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Как сфотографировать паркет для предварительной оценки"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8ef"/><stop offset=".6" stop-color="#e5c29b"/><stop offset="1" stop-color="#6f4628"/></linearGradient><pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse"><path d="M0 30h90M0 60h90" stroke="#6f4628" stroke-opacity=".08" stroke-width="3"/><path d="M14 0c18 26 18 58 0 90M58 0c-16 28-16 56 0 90" stroke="#6f4628" stroke-opacity=".06" stroke-width="2" fill="none"/></pattern><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#3a2416" flood-opacity=".18"/></filter></defs><rect width="1200" height="800" rx="44" fill="url(#bg)"/><rect width="1200" height="800" rx="44" fill="url(#grain)"/><rect x="82" y="78" width="1036" height="644" rx="38" fill="#fff8ef" opacity=".94" filter="url(#s)"/><text x="140" y="170" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#6f4628">Оценка паркета по фото</text><text x="140" y="245" font-family="Arial, sans-serif" font-size="32" fill="#3a2416">Три кадра помогают быстрее понять задачу</text><rect x="140" y="310" width="280" height="250" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4"/><text x="180" y="380" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#24170f">1. Общий вид</text><text x="180" y="435" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">Комната целиком,</text><text x="180" y="475" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">мебель и проходы</text><rect x="460" y="310" width="280" height="250" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4"/><text x="500" y="380" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#24170f">2. Дефект</text><text x="500" y="435" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">Щели, старый лак,</text><text x="500" y="475" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">пятна или планки</text><rect x="780" y="310" width="280" height="250" rx="28" fill="#fff" stroke="#d7b38d" stroke-width="4"/><text x="820" y="380" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#24170f">3. Видео</text><text x="820" y="435" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">Если пол скрипит</text><text x="820" y="475" font-family="Arial, sans-serif" font-size="24" fill="#5d4638">или двигается</text><text x="140" y="650" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#6f4628">Добавьте площадь и населённый пункт</text></svg>