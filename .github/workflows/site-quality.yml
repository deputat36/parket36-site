name: Site quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
      - name: Type-check Edge Function
        id: edge_typecheck
        continue-on-error: true
        run: deno check supabase/functions/parket-public-lead/index.ts > edge-function-check.log 2>&1
      - name: Upload Edge Function check log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-function-check
          path: edge-function-check.log
          if-no-files-found: error
          retention-days: 14
      - name: Fail on Edge Function type errors
        if: steps.edge_typecheck.outcome == 'failure'
        run: cat edge-function-check.log && exit 1
      - name: Run quality gate
        run: python tools/run_quality_checks.py
