name: Site quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate shared settings
        run: python tools/site_settings.py --check
      - name: Run static audit
        run: python tools/check_site.py
      - name: Run extra guardrails
        run: python tools/check_guardrails.py
      - name: Validate lead paths
        run: python tools/check_lead_paths.py
      - name: Build public directory
        run: python tools/build_pages.py
