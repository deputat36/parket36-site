name: Site quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python quality dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-quality.txt
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
      - name: Test Edge Function field limits
        run: deno test supabase/functions/parket-public-lead/field-limits_test.ts
      - name: Test Edge Function origin policy
        run: deno test supabase/functions/parket-public-lead/origin-policy_test.ts
      - name: Test Edge Function payload shape
        run: deno test supabase/functions/parket-public-lead/payload-shape_test.ts
      - name: Test Edge Function contact phone
        run: deno test supabase/functions/parket-public-lead/contact-validation_test.ts
      - name: Test controlled lead verifier request ID
        run: deno test supabase/functions/parket-lead-verify/request-id_test.ts
      - name: Type-check Edge Functions
        id: edge_typecheck
        continue-on-error: true
        run: |
          deno check supabase/functions/parket-public-lead/index.ts
          deno check supabase/functions/parket-lead-verify/index.ts
          > edge-function-check.log 2>&1
      - name: Upload Edge Function check log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edge-function-check
          path: edge-function-check.log
          if-no-files-found: error
          retention-days: 14
      - name: Fail on Edge Function type errors
        if: steps.edge_typecheck.outcome == 'failure'
        run: cat edge-function-check.log && exit 1
      - name: Run quality gate
        id: quality_gate
        continue-on-error: true
        run: python tools/run_quality_checks.py > quality-gate.log 2>&1
      - name: Upload quality gate log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-gate-log
          path: quality-gate.log
          if-no-files-found: error
          retention-days: 14
      - name: Generate content inventory
        if: always()
        run: python tools/build_content_inventory.py --output-dir reports/content-inventory
      - name: Upload content inventory
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: content-inventory
          path: reports/content-inventory
          if-no-files-found: error
          retention-days: 30
      - name: Generate content similarity report
        if: always()
        run: python tools/build_content_similarity_report.py --output-dir reports/content-similarity
      - name: Upload content similarity report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: content-similarity-report
          path: reports/content-similarity
          if-no-files-found: error
          retention-days: 30
      - name: Generate internal link map
        if: always()
        run: python tools/build_internal_link_map.py --output-dir reports/internal-links
      - name: Upload internal link map
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: internal-link-map
          path: reports/internal-links
          if-no-files-found: error
          retention-days: 30
      - name: Generate sitemap candidate
        if: always()
        run: python tools/build_sitemap.py --source sitemap.xml --output reports/generated-sitemap.xml
      - name: Upload sitemap candidate
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generated-sitemap
          path: reports/generated-sitemap.xml
          if-no-files-found: error
          retention-days: 30
      - name: Fail on quality gate errors
        if: steps.quality_gate.outcome == 'failure'
        run: cat quality-gate.log && exit 1
