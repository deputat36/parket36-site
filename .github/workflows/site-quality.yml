name: Site quality

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
      - name: Type-check Edge Function
        run: deno check supabase/functions/parket-public-lead/index.ts
      - name: Run quality gate
        run: python tools/run_quality_checks.py
