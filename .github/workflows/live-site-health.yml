name: Live site health

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types: [completed]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: live-site-health
  cancel-in-progress: false

jobs:
  health:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run live health check
        id: live_health
        continue-on-error: true
        env:
          LIVE_HEALTH_ATTEMPTS: ${{ github.event_name == 'workflow_run' && '6' || '1' }}
        run: >-
          python tools/check_live_site.py
          --report live-health-report.md
          --attempts "$LIVE_HEALTH_ATTEMPTS"
          --retry-delay 10
          --timeout 20
      - name: Check live call and IndexNow routes
        id: live_conversion
        continue-on-error: true
        env:
          LIVE_CONVERSION_ATTEMPTS: ${{ github.event_name == 'workflow_run' && '6' || '1' }}
        run: >-
          python tools/check_live_conversion.py
          --report live-health-report.md
          --attempts "$LIVE_CONVERSION_ATTEMPTS"
          --retry-delay 10
          --timeout 20
      - name: Check live client-ready homepage copy
        id: live_public_copy
        continue-on-error: true
        env:
          LIVE_PUBLIC_COPY_ATTEMPTS: ${{ github.event_name == 'workflow_run' && '6' || '1' }}
        run: >-
          python tools/check_live_public_copy.py
          --report live-health-report.md
          --attempts "$LIVE_PUBLIC_COPY_ATTEMPTS"
          --retry-delay 10
          --timeout 20
      - name: Check deployment source
        id: deployment_source
        continue-on-error: true
        env:
          EXPECTED_DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
          EXPECTED_DEPLOY_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
          DEPLOY_ATTEMPTS: ${{ github.event_name == 'workflow_run' && '6' || '1' }}
        run: >-
          python tools/check_live_deployment.py
          --report live-health-report.md
          --expected-sha "$EXPECTED_DEPLOY_SHA"
          --expected-run-id "$EXPECTED_DEPLOY_RUN_ID"
          --attempts "$DEPLOY_ATTEMPTS"
          --retry-delay 10
      - name: Upload live health report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-health-report
          path: live-health-report.md
          if-no-files-found: error
          retention-days: 30
      - name: Update repeated failure issue
        if: steps.live_health.outcome == 'failure' || steps.live_conversion.outcome == 'failure' || steps.live_public_copy.outcome == 'failure' || steps.deployment_source.outcome == 'failure'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/manage_live_health_issue.py failure --report live-health-report.md
      - name: Close recovered issue
        if: steps.live_health.outcome == 'success' && steps.live_conversion.outcome == 'success' && steps.live_public_copy.outcome == 'success' && steps.deployment_source.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/manage_live_health_issue.py success
      - name: Complete Pages switch issue
        if: >-
          github.event_name == 'workflow_run' &&
          steps.live_health.outcome == 'success' &&
          steps.live_conversion.outcome == 'success' &&
          steps.live_public_copy.outcome == 'success' &&
          steps.deployment_source.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
          PAGES_DEPLOY_RUN_ID: ${{ github.event.workflow_run.id }}
        run: python tools/complete_pages_switch_issue.py
      - name: Fail on live health errors
        if: steps.live_health.outcome == 'failure' || steps.live_conversion.outcome == 'failure' || steps.live_public_copy.outcome == 'failure' || steps.deployment_source.outcome == 'failure'
        run: exit 1
