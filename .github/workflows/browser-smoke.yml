name: Browser smoke

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:e2e
      - name: Upload browser test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
