name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python quality dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-quality.txt
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
      - name: Test Edge Function field limits
        run: deno test supabase/functions/parket-public-lead/field-limits_test.ts
      - name: Test Edge Function origin policy
        run: deno test supabase/functions/parket-public-lead/origin-policy_test.ts
      - name: Type-check Edge Function
        run: deno check supabase/functions/parket-public-lead/index.ts
      - name: Run quality gate
        run: python tools/run_quality_checks.py
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
