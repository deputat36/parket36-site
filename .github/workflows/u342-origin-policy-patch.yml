name: U342 Origin policy patch

on:
  push:
    branches:
      - u-342-1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: u-342-1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply deterministic patch
        run: python tools/apply_u342_origin_policy_patch.py
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/parket-public-lead/index.ts
          git commit -m "Apply origin policy validation"
          git push origin HEAD:u-342-1
