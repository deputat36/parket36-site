name: Notify IndexNow after deploy

on:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: indexnow-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  notify:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate IndexNow helper
        run: |
          python tools/submit_indexnow.py --self-test
          python tools/submit_indexnow.py --check
          python tools/manage_indexnow_issue.py --self-test
      - name: Notify IndexNow
        id: indexnow
        continue-on-error: true
        run: >-
          python tools/submit_indexnow.py
          --submit
          --attempts 6
          --retry-delay 10
          --timeout 20
          --report indexnow-report.md
      - name: Upload IndexNow report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: indexnow-report
          path: indexnow-report.md
          if-no-files-found: warn
          retention-days: 30
      - name: Add IndexNow result to summary
        if: always() && hashFiles('indexnow-report.md') != ''
        run: cat indexnow-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Update repeated IndexNow failure issue
        if: steps.indexnow.outcome == 'failure'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/manage_indexnow_issue.py failure --report indexnow-report.md
      - name: Close recovered IndexNow issue
        if: steps.indexnow.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/manage_indexnow_issue.py success
      - name: Fail on IndexNow notification error
        if: steps.indexnow.outcome == 'failure'
        run: exit 1
